name: Android CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create debug keystore for release signing
        run: |
          keytool -genkey -v -keystore app/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=CI Build, O=OpenAgent, C=US"

      - name: Build All APKs (Debug + Release)
        run: ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK (Artifact)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: openagent-manager-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK (Artifact)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: openagent-manager-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: app/build/reports/
          retention-days: 7

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate release tag
        id: tag
        run: |
          echo "tag=v$(date +'%Y%m%d.%H%M%S')" >> $GITHUB_OUTPUT

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: openagent-manager-debug
          path: apks/

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: openagent-manager-release
          path: apks/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Build ${{ steps.tag.outputs.tag }}"
          body: |
            ## OpenAgent Manager 自动构建

            ### 构建信息
            - **提交**: ${{ github.sha }}
            - **日期**: ${{ github.event.head_commit.timestamp }}
            - **触发**: ${{ github.event_name }}

            ### 下载
            - **Debug APK**: 适用于开发和调试
            - **Release APK**: 适用于安装使用（已混淆+签名）

            > 由 GitHub Actions 自动构建
          files: |
            apks/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
